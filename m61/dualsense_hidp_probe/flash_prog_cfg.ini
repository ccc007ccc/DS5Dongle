[cfg]
# 0: no erase, 1: programmed section erase, 2: chip erase
erase = 1
# skip mode first parameter is skip address, second parameter is skip length
skip_mode = 0x0, 0x0
# 0: do not use isp mode, 1: use isp mode
boot2_isp_mode = 0

[boot2]
filedir = ./build/build_out/boot2_$(CHIPNAME)_*.bin
address = 0x000000

[partition]
filedir = ./build/build_out/partition*.bin
address = 0xE000

[FW]
filedir = ./build/build_out/m61_dualsense_hidp_probe_$(CHIPNAME)*.bin
address = @partition
