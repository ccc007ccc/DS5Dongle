name: Windows one-file flasher

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/windows-flasher.yml"
      - "tools/m61-flasher/**"
      - "THIRD_PARTY_NOTICES.md"
  pull_request:
    paths:
      - ".github/workflows/windows-flasher.yml"
      - "tools/m61-flasher/**"
      - "THIRD_PARTY_NOTICES.md"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload the built EXE and notices to an existing Release"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Existing Release tag used when publish_release is enabled"
        required: true
        type: string
        default: "v0.8.1"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7.0.0

      - name: Check out locked Bouffalo SDK
        uses: actions/checkout@v7.0.0
        with:
          repository: bouffalolab/bl_mcu_sdk
          ref: d9306a4a221db414131337ec95113e3adaf7072b
          path: dependencies/bl_mcu_sdk

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test and build flasher
        shell: pwsh
        env:
          M61_BLFLASHCOMMAND: ${{ github.workspace }}\dependencies\bl_mcu_sdk\tools\bflb_tools\bouffalo_flash_cube\BLFlashCommand.exe
        run: |
          cargo fmt --manifest-path tools\m61-flasher\Cargo.toml -- --check
          cargo test --locked --manifest-path tools\m61-flasher\Cargo.toml
          cargo build --locked --manifest-path tools\m61-flasher\Cargo.toml
          tools\m61-flasher\target\debug\m61-flasher.exe --assets-info
          tools\m61-flasher\target\debug\m61-flasher.exe --list-releases
          tools\m61-flasher\target\debug\m61-flasher.exe --release v0.8.1 --verify-release --yes
          cargo build --locked --release --manifest-path tools\m61-flasher\Cargo.toml

      - name: Package one-file flasher and notices
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item tools\m61-flasher\target\release\m61-flasher.exe dist\M61-Flasher-Windows.exe
          Copy-Item THIRD_PARTY_NOTICES.md dist\THIRD_PARTY_NOTICES.md
          Copy-Item dependencies\bl_mcu_sdk\LICENSE dist\Bouffalo-SDK-Apache-2.0.txt
          $hash = (Get-FileHash -Algorithm SHA256 dist\M61-Flasher-Windows.exe).Hash.ToLowerInvariant()
          "$hash  M61-Flasher-Windows.exe" | Set-Content -Encoding ascii dist\M61-Flasher-Windows.exe.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: M61-Flasher-Windows-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: dist/

  publish:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built flasher
        uses: actions/download-artifact@v8.0.1
        with:
          name: M61-Flasher-Windows-${{ github.sha }}
          path: dist

      - name: Upload assets to Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
