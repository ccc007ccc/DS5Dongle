name: Firmware CI

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/firmware-ci.yml"
      - "m61/**"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/firmware-ci.yml"
      - "m61/**"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Run cross-platform offline checks
        run: python tools/run_offline_checks.py

  windows-release-build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Check out locked Bouffalo SDK
        uses: actions/checkout@v7
        with:
          repository: bouffalolab/bl_mcu_sdk
          ref: d9306a4a221db414131337ec95113e3adaf7072b
          path: dependencies/bl_mcu_sdk

      - name: Check out locked T-Head toolchain
        uses: actions/checkout@v7
        with:
          repository: bouffalolab/toolchain_gcc_t-head_windows
          ref: 072fc29d765774d66366c57a4d962e90c366ef1b
          path: dependencies/toolchain_gcc_t-head_windows

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Build locked release profile
        shell: pwsh
        run: |
          ./m61/dualsense_hidp_probe/build_windows.ps1 -Command All `
            -SdkPath "$PWD/dependencies/bl_mcu_sdk" `
            -ToolchainBin "$PWD/dependencies/toolchain_gcc_t-head_windows/bin"

      - name: Verify memory and provenance gates
        shell: pwsh
        run: |
          $out = "m61/dualsense_hidp_probe/build-win/build_out"
          python tools/check_m61_realtime_memory.py `
            "$out/m61_dualsense_hidp_probe_bl616.elf" `
            --size-tool "$PWD/dependencies/toolchain_gcc_t-head_windows/bin/riscv64-unknown-elf-size.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $manifest = Get-Content "$out/m61_dualsense_hidp_probe_bl616.manifest.json" -Raw | ConvertFrom-Json
          if ($manifest.profile -ne "release" -or $manifest.source.dirty) {
            throw "Expected a clean release manifest"
          }

      - name: Upload reproducible firmware artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: m61-dualsense-firmware-${{ github.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            m61/dualsense_hidp_probe/build-win/build_out/boot2_bl616_*.bin
            m61/dualsense_hidp_probe/build-win/build_out/partition.bin
            m61/dualsense_hidp_probe/build-win/build_out/m61_dualsense_hidp_probe_bl616.bin
            m61/dualsense_hidp_probe/build-win/build_out/m61_dualsense_hidp_probe_bl616.bin.hash
            m61/dualsense_hidp_probe/build-win/build_out/m61_dualsense_hidp_probe_bl616.elf
            m61/dualsense_hidp_probe/build-win/build_out/m61_dualsense_hidp_probe_bl616.map
            m61/dualsense_hidp_probe/build-win/build_out/m61_dualsense_hidp_probe_bl616.manifest.json
